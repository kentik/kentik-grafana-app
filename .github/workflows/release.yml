name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v2.0.0

env:
  PLUGIN_ID: kentik-connect-datasource
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      id-token: write
      contents: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Full history for changelog generation

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify version sync (tag vs package.json)
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: git tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version sync OK: $TAG_VERSION"

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint --cache .

      - name: OSV security scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=./package-lock.json
            --fail-on-vuln

      - name: Build plugin
        run: npm run build

      - name: Run tests
        run: npx jest --no-coverage

      - name: Sign plugin
        run: npx @grafana/sign-plugin@latest
        env:
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}

      - name: Package plugin
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "/tmp/pkg/${{ env.PLUGIN_ID }}"
          cp -r dist/* "/tmp/pkg/${{ env.PLUGIN_ID }}/"
          cd /tmp/pkg
          zip -r "${{ github.workspace }}/${{ env.PLUGIN_ID }}-${VERSION}.zip" "${{ env.PLUGIN_ID }}"
          cd "${{ github.workspace }}"
          sha1sum "${{ env.PLUGIN_ID }}-${VERSION}.zip" > "${{ env.PLUGIN_ID }}-${VERSION}.zip.sha1"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.PLUGIN_ID }}-*.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ env.PLUGIN_ID }}-*.zip
            ${{ env.PLUGIN_ID }}-*.sha1

